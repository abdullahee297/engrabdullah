{% extends "index.html" %}

{% block content %}

<section class="min-h-screen bg-gray-900 text-white flex items-center justify-center px-6">
    <div class="max-w-6xl w-full grid md:grid-cols-2 gap-10">

        <div class="bg-gray-800 p-8 rounded-2xl shadow-lg">
            <h2 class="text-3xl font-bold mb-6 text-[#00ffb7]">Contact Me</h2>

            {% if success %}
                <p class="text-[#00ffb7] mb-4">Message sent successfully!</p>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <input type="text" name="name" placeholder="Your Name"
                       class="w-full mb-4 p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[#00ffb7]">

                <input type="email" name="email" placeholder="Your Email"
                       class="w-full mb-4 p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[#00ffb7]">

                <textarea name="message" rows="5" placeholder="Your Message"
                          class="w-full mb-4 p-3 rounded bg-gray-700 focus:outline-none focus:ring-2 focus:ring-[#00ffb7]"></textarea>

                <button type="submit"
                        class="w-full bg-[#00ffb7] text-black hover:bg-[#00e6a5] transition p-3 rounded font-semibold">
                    Send Message
                </button>
            </form>
        </div>

        <div class="flex flex-col justify-center">
            <h2 class="text-3xl font-bold mb-6 text-[#00ffb7]">Get in Touch</h2>

            <p class="mb-4 text-gray-300">
                Feel free to contact me for any work or collaboration.
            </p>

            <div class="space-y-4">
                <p>
                    📧
                    <span class="text-[#ffffff]">2022ee297@student.uet.edu.pk</span>
                </p>

                <p>
                    📞
                    <span class="text-[#ffffff]">+92 328 8512392</span>
                </p> 

                <p>
                    📍
                    <span class="text-[#ffffff]">Lahore, Pakistan</span>
                </p>
            </div>
        </div>

    </div>
</section>

{% endblock content %}
