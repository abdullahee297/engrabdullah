{% extends "index.html" %}

{% block content %}

<div class="bg-slate-900 min-h-screen py-16 px-6">

    <h1 class="text-6xl font-bold text-center mb-14 bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent">
        Skills
    </h1>

    <div class="max-w-6xl mx-auto grid gap-6 sm:grid-cols-2 md:grid-cols-3">

        {% for skill, percent, icon in skills %}

        <div class="group relative rounded-xl p-[1px] hover:from-purple-500 hover:to-pink-500 transition duration-500">
            
            <div class="relative bg-slate-800 rounded-xl p-5">

                <div class="absolute left-0 top-0 h-full w-1 bg-gradient-to-b from-purple-400 to-pink-600 rounded-l-xl"></div>

                <div class="pl-4 text-center">

                    <div class="text-2xl mb-2">{{ icon }}</div>

                    <h2 class="text-lg font-semibold mb-3 bg-gradient-to-r from-gray-300 to-gray-300 bg-clip-text text-transparent group-hover:from-purple-400 group-hover:to-pink-600 transition duration-500">
                        {{ skill }}
                    </h2>

                    <div class="w-full bg-slate-700 rounded-full h-1.5">
                        <div class="h-1.5 rounded-full bg-gradient-to-r from-purple-400 to-pink-600" style="width: {{ percent }}%"></div>
                    </div>

                    <p class="text-gray-400 mt-1 text-xs">{{ percent }}%</p>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

{% endblock content %}
