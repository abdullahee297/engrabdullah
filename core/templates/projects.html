{% extends "index.html" %}

{% block content %}

<div class="bg-slate-900 min-h-screen py-16 px-6">

    <!-- Heading -->
    <h1 class="text-6xl font-bold text-center mb-10 bg-gradient-to-r from-purple-400 to-pink-600 bg-clip-text text-transparent">
        My Projects
    </h1>

    <div class="flex flex-wrap justify-center gap-3 mb-12">
        <button class="filter-btn active px-4 py-2 rounded-full bg-purple-500 text-white text-sm">All</button>
        <button class="filter-btn px-4 py-2 rounded-full bg-slate-700 text-gray-300 text-sm">AI</button>
        <button class="filter-btn px-4 py-2 rounded-full bg-slate-700 text-gray-300 text-sm">ML</button>
        <button class="filter-btn px-4 py-2 rounded-full bg-slate-700 text-gray-300 text-sm">Web</button>
        <button class="filter-btn px-4 py-2 rounded-full bg-slate-700 text-gray-300 text-sm">Game</button>
    </div>

    <div class="max-w-7xl mx-auto grid gap-8 sm:grid-cols-2 lg:grid-cols-3">

        {% for project in projects %}

        <div class="project-card group relative rounded-2xl p-[1px]
            bg-slate-800 transition duration-500
            hover:bg-gradient-to-r hover:from-purple-500 hover:via-slate-700 hover:to-pink-500"
             data-category="{{ project.category }}">

            <div class="rounded-2xl overflow-hidden bg-slate-900">

                <div class="h-40 overflow-hidden">
                    <img src="{{ project.image }}" 
                         class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>

                <div class="p-5">

                    <span class="text-xs text-purple-400 uppercase tracking-wide">
                        {{ project.domain }}
                    </span>

                    <h2 class="text-xl font-semibold text-white mt-2 mb-2">
                        {{ project.title }}
                    </h2>

                    <p class="text-gray-400 text-sm leading-relaxed mb-4 text-justify">
                        {{ project.description }}
                    </p>

                    <div class="flex gap-3">

                        <a href="{{ project.github }}" target="_blank"
                           class="text-xs px-3 py-1 rounded bg-slate-700 hover:bg-purple-500 transition">
                            GitHub
                        </a>

                        <a href="{{ project.demo }}" target="_blank"
                           class="text-xs px-3 py-1 rounded bg-slate-700 hover:bg-pink-500 transition">
                            Live
                        </a>

                    </div>

                </div>
            </div>

        </div>

        {% endfor %}

    </div>

</div>

<script>
    const buttons = document.querySelectorAll(".filter-btn");
    const cards = document.querySelectorAll(".project-card");

    buttons.forEach(btn => {
        btn.addEventListener("click", () => {

            buttons.forEach(b => {
                b.classList.remove("bg-purple-500", "text-white", "active");
                b.classList.add("bg-slate-700", "text-gray-300");
            });

            btn.classList.remove("bg-slate-700", "text-gray-300");
            btn.classList.add("bg-purple-500", "text-white", "active");

            const filter = btn.textContent.toLowerCase();

            cards.forEach(card => {
                if (filter === "all" || card.dataset.category === filter) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });

        });
    });
</script>

{% endblock content%}
